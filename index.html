<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pi-Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <h2>Pi-Store</h2>
        <button id="toggleSidebar">☰</button>

        <!-- Pi Wallet Balance -->
        <div id="walletBalance">
            <h3>Balance: <span id="piBalance">Loading...</span> Pi</h3>
        </div>

        <ul>
            <li><button onclick="location.href='index.html'">Dashboard</button></li>
            <li><button onclick="location.href='assets.html'">List Digital Asset</button></li>
            <li><button onclick="location.href='invest.html'">Invest Pi</button></li>
            <li><button onclick="location.href='swap.html'">Swap Pi</button></li>
            <li><button onclick="location.href='admin.html'">Admin Panel</button></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div id="main">
        <h2>Welcome to Pi-Store Dashboard</h2>
        <button onclick="connectPi()">Connect Pi Account</button>
    </div>

<script>
function fetchPiBalance() {
    setTimeout(() => {
        document.getElementById("piBalance").innerText = "3.5";
    }, 1000);
}
fetchPiBalance();
</script>

</body>
</html>
