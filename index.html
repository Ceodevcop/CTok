<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        if (typeof Pi === "undefined") {
            document.getElementById("status").innerText = "Pi SDK failed to load. Please try again inside Pi Browser.";
        }
    });
</script>
<script>
    Pi.init({ version: "2.0", sandbox: false });
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Tok - Connect Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="supabase.js"></script>
</head>
<body>
    <button id="connectWallet">Connect Wallet</button>
    <p id="status"></p>

    <script>
        const PI_API_KEY = "jtmef4npxu4mj2vjmqezbhoq2r3t7c45qfkaxbcquuy8lpy0qfxffmgitob3hchn";  // Replace with your actual API key
        const C_TOK_WALLET = "GBAYVTW4RLO3QXXG75T7EICTBCETK5CQPEI4DM3TUDOKDND5CT2KMMFU"; // Replace with your Pi Wallet address

        document.getElementById("connectWallet").addEventListener("click", async () => {
            try {
                const scopes = ["username", "payments"];
                const authResult = await Pi.authenticate(scopes, (res) => res);

                if (authResult) {
                    const username = authResult.user.username;
                    document.getElementById("status").innerText = "Wallet connected! Sending 1 Pi transaction request...";

                    // Request a payment from user
                    const payment = await Pi.createPayment({
                        amount: 1,
                        memo: "C-Tok Registration",
                        metadata: { username },
                        to_address: C_TOK_WALLET,
                    });

                    if (payment.status === "COMPLETED") {
                        document.getElementById("status").innerText = "Payment successful! Verifying...";

                        // Verify the payment using Pi API
                        const verified = await verifyPayment(payment.identifier);
                        
                        if (verified) {
                            // Save user to Supabase
                            await supabase.from("users").insert([{ username }]);
                            window.location.href = "register.html"; // Redirect to register page
                        } else {
                            document.getElementById("status").innerText = "Transaction verification failed!";
                        }
                    } else {
                        document.getElementById("status").innerText = "Payment failed. Try again.";
                    }
                }
            } catch (error) {
                console.error("Authentication error:", error);
                document.getElementById("status").innerText = "Error connecting wallet.";
            }
        });

        async function verifyPayment(paymentId) {
            try {
                const response = await fetch("https://api.minepi.com/v2/payments/" + paymentId, {
                    method: "GET",
                    headers: {
                        "Authorization": "Key " + PI_API_KEY,
                        "Content-Type": "application/json",
                    },
                });

                const data = await response.json();
                return data.status === "completed";
            } catch (error) {
                console.error("Payment verification error:", error);
                return false;
            }
        }
    </script>
</body>
</html>
