<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Tok - Connect Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="supabase.js"></script>
</head>
<body>
    <button id="connectWallet">Connect Wallet</button>
    <p id="status"></p>

    <script>
        const C_TOK_WALLET = "your-pi-wallet-address"; // Replace with your Pi Wallet address

        document.getElementById("connectWallet").addEventListener("click", async () => {
            try {
                const scopes = ["username", "payments"];
                const authResult = await Pi.authenticate(scopes, (res) => res);

                if (authResult) {
                    const username = authResult.user.username;
                    document.getElementById("status").innerText = "Wallet connected! Sending 1 Pi transaction request...";

                    // Create a Pi Payment
                    const payment = await Pi.createPayment({
                        amount: 1,
                        memo: "C-Tok Registration",
                        metadata: { username },
                        to_address: C_TOK_WALLET,
                    });

                    if (payment.status === "COMPLETED") {
                        document.getElementById("status").innerText = "Payment successful! Registering...";

                        // Save user to Supabase
                        await supabase.from("users").insert([{ username }]);

                        window.location.href = "register.html"; // Redirect to register page
                    } else {
                        document.getElementById("status").innerText = "Payment failed. Try again.";
                    }
                }
            } catch (error) {
                console.error("Authentication error:", error);
                document.getElementById("status").innerText = "Error connecting wallet.";
            }
        });
    </script>
</body>
</html>
