<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Tok - Connect Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <button id="connectWallet">Connect Wallet</button>
    <p id="status"></p>

    <script>
        // Initialize Supabase
        const supabase = supabase.createClient(
            "https://cqrnlcrpnyyhxghqwpnm.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcm5sY3Jwbnl5aHhnaHF3cG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAzOTc2OTgsImV4cCI6MjA1NTk3MzY5OH0.ZWYjte3-RHGV3Td7z3cdS3M6toHaMFqJSPJ0iFVd2X4"
        );

        // Pi API Key & C-Tok Wallet Address
        const PI_API_KEY = "jtmef4npxu4mj2vjmqezbhoq2r3t7c45qfkaxbcquuy8lpy0qfxffmgitob3hchn";
        const C_TOK_WALLET = "GBAYVTW4RLO3QXXG75T7EICTBCETK5CQPEI4DM3TUDOKDND5CT2KMMFU";

        document.getElementById("connectWallet").addEventListener("click", async () => {
            try {
                // Initialize Pi SDK
                Pi.init({ version: "2.0", sandbox: false });

                // Authenticate user
                const authResult = await Pi.authenticate(["username", "payments"], (res) => res);
                if (!authResult) throw new Error("Authentication failed");

                const username = authResult.user.username;
                document.getElementById("status").innerText = "Wallet connected! Sending 1 Pi transaction...";

                // Request a payment from the user
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "C-Tok Registration",
                    metadata: { username },
                    to_address: C_TOK_WALLET,
                });

                if (payment.status === "COMPLETED") {
                    document.getElementById("status").innerText = "Payment successful! Verifying...";

                    // Verify the payment using Pi API
                    const verified = await verifyPayment(payment.identifier);
                    
                    if (verified) {
                        // Save user to Supabase
                        await supabase.from("users").insert([{ username }]);
                        window.location.href = "register.html"; // Redirect to registration page
                    } else {
                        document.getElementById("status").innerText = "Transaction verification failed!";
                    }
                } else {
                    document.getElementById("status").innerText = "Payment failed. Try again.";
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById("status").innerText = "Error connecting wallet. Try again.";
            }
        });

        // Function to verify payment
        async function verifyPayment(paymentId) {
            try {
                const response = await fetch(`https://api.minepi.com/v2/payments/${paymentId}`, {
                    method: "GET",
                    headers: {
                        "Authorization": `Key ${PI_API_KEY}`,
                        "Content-Type": "application/json",
                    },
                });

                const data = await response.json();
                return data.status === "completed";
            } catch (error) {
                console.error("Payment verification error:", error);
                return false;
            }
        }
    </script>
</body>
</html>
