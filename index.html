<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Tok - Connect Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="supabase.js"></script>
</head>
<body>
    <button id="connectWallet">Connect Wallet</button>
    <p id="status"></p>

    <script>
        let username = "";

        document.getElementById("connectWallet").addEventListener("click", async () => {
            try {
                const scopes = ["username", "payments"];
                const authResult = await Pi.authenticate(scopes, (res) => res);

                if (authResult) {
                    username = authResult.user.username;
                    document.getElementById("status").innerText = "Wallet connected! Verifying 1 Pi transaction...";

                    // Check if user already exists in Supabase
                    const { data: existingUser, error } = await supabase
                        .from("users")
                        .select("username")
                        .eq("username", username)
                        .single();

                    if (existingUser) {
                        window.location.href = "dashboard.html"; // Redirect if already registered
                        return;
                    }

                    // Check Pi Transaction (Mock Check)
                    setTimeout(async () => {
                        const transactionVerified = checkTransaction();

                        if (transactionVerified) {
                            await supabase.from("users").insert([{ username }]);
                            window.location.href = "register.html"; // Redirect if successful
                        } else {
                            document.getElementById("status").innerText = "1 Pi transaction not found. Please try again.";
                        }
                    }, 2000);
                }
            } catch (error) {
                console.error("Authentication error:", error);
                document.getElementById("status").innerText = "Error connecting wallet.";
            }
        });

        function checkTransaction() {
            return true; // Change to `false` to simulate failure
        }
    </script>
</body>
</html>
