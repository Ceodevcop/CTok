<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Sidebar Toggle
document.getElementById("toggleSidebar").addEventListener("click", function() {
    document.getElementById("sidebar").classList.toggle("collapsed");
});

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Store</title>

</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <h2>Pi-Store</h2>

        <!-- Pi Wallet Balance -->
        <div id="walletBalance">

        <ul>
            <li><button onclick="location.href='dashboard.html'">Dashboard</button></li>

    <script>
    // Sidebar Toggle
    document.getElementById("toggleSidebar").addEventListener("click", function() {
        document.getElementById("sidebar").classList.toggle("collapsed");
    });

    // Fetch Pi Wallet Balance (Dummy Data)
    function fetchPiBalance() {
        setTimeout(() => {
            document.getElementById("piBalance").innerText = "3.5"; // Example balance
        }, 1000);
    }
    fetchPiBalance();
