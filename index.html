<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="pushsdk" content="58bf120be03bccafe9e0592b04138695">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marriage Matchmaking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Register Your Profile</h2>
    <form id="profileForm">
        <input type="text" id="name" placeholder="Your Name" required><br>
        <input type="number" id="age" placeholder="Your Age" required><br>
        <input type="text" id="location" placeholder="Your Location" required><br>
        <input type="text" id="hobbies" placeholder="Your Hobbies (comma-separated)"><br>
        <input type="text" id="interests" placeholder="Your Interests (comma-separated)"><br>
        <input type="file" id="imageUpload" multiple accept="image/*"><br>
        <div id="imagePreview"></div>
        <button type="submit">Submit Profile</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
