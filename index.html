<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pi-Store</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="grid-container">
    <header class="header">Header</header>
    
    <!-- Sidebar placeholder -->
    <div id="sidebar-container"></div>

    <article class="content">
      <h1>Build on Web3 for the Future</h1>
      <p>
        Use the Pi SDK to build decentralized applications that integrate 
        with Pi Cryptocurrency and the Pi Platform.
      </p>
      <button onclick="connectPiWallet()">Connect Pi Wallet</button>
    </article>

    <footer class="footer">Footer</footer>
  </main>

  <!-- Load shared components first -->
  <script>
    // Load shared sidebar
    fetch('sidebar-component.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('sidebar-container').innerHTML = html;
        initializeSidebar();
      });
  </script>

  <!-- Main scripts -->
  <script src="script.js"></script>
</body>
</html>
